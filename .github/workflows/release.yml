name: release

# Push a tag like v0.2.0 and this builds every platform, writes SHA256SUMS,
# and publishes the GitHub release. `scripts/release.sh` cuts the tag for you.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-build all platforms
        run: make release VERSION="${GITHUB_REF_NAME}"

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum pixeltui-* > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=(--repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --generate-notes)
          # Pre-release for tags with a suffix (e.g. v0.2.0-rc1) so `update` keeps
          # pulling the last stable from releases/latest.
          case "${GITHUB_REF_NAME}" in
            *-*) flags+=(--prerelease) ;;
          esac
          gh release create "${GITHUB_REF_NAME}" dist/* "${flags[@]}"
